# ATP Test Case ID: SG_08
# HP Sprocket — email sign-up weak password validation
appId: com.hp.impulse.sprocket
name: "SG_08 - Sign up with Email invalid password"
---
- launchApp:
    clearState: true
- runFlow: subflows/open_signup_email_form.yaml
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Email*"
- inputText: maestro.pwd.invalid@yopmail.com
- tapOn: "Password*"
- inputText: ab
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "At least 1 uppercase letter"
- assertVisible: "At least 1 uppercase letter"
- assertVisible: "At least 8 characters"
- assertVisible: "Password must include:"

