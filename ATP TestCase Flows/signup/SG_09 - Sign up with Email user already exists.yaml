# ATP Test Case ID: SG_09
# HP Sprocket — email sign-up duplicate user alert
appId: com.hp.impulse.sprocket
name: "SG_09 - Sign up with Email user already exists"
---
- launchApp:
    clearState: true
- runFlow: subflows/open_signup_email_form.yaml
- tapOn: "Full Name*"
- inputText: Nitesh Mehra
- tapOn: "Email*"
- inputText: niteshmehra56@gmail.com
- tapOn: "Password*"
- inputText: 252546Nm#
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- assertVisible: "Email already in use"
