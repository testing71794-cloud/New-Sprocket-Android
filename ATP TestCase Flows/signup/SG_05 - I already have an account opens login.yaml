# ATP Test Case ID: SG_05
# I already have an account — opens Log In options
appId: com.hp.impulse.sprocket
name: "SG_05 - I already have an account opens login"
tags:
  - signup
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/open_signup_screen.yaml
- tapOn: "I already have an account"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Log In"
    timeout: 15000
- runFlow: ../common/subflows/assert_login_options_screen.yaml
