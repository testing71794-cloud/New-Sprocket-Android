# ATP Test Case ID: SG_10
# Duplicate email — Forgot password from Email already in use
appId: com.hp.impulse.sprocket
name: "SG_10 - Sign up with Email forgot password from duplicate"
tags:
  - signup
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/open_signup_email_form.yaml
- tapOn: "Full Name*"
- inputText: Nitesh Mehra
- tapOn: "Email*"
- inputText: niteshmehra56@gmail.com
- tapOn: "Password*"
- inputText: 252546Nm#
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- assertVisible: "Email already in use"
- runFlow:
    when:
      visible: ".*(?i)Forgot password.*"
    commands:
      - tapOn: ".*(?i)Forgot password.*"
      - waitForAnimationToEnd:
          timeout: 3000
- assertVisible:
    text: ".*(?i)(Forgot|password|reset|email).*"
    optional: true
