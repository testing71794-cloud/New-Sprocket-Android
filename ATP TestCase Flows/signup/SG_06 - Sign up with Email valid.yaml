# ATP Test Case ID: SG_06
# HP Sprocket — email sign-up valid credentials → Terms
appId: com.hp.impulse.sprocket
name: "SG_06 - Sign up with Email valid"
---
- launchApp:
    clearState: true
- runFlow: subflows/open_signup_email_form.yaml
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- runScript: scripts/gen_unique_email.js
- tapOn: "Email*"
- inputText: ${output.signupEmail}
- tapOn: "Password*"
- inputText: TestPass1a
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Welcome,\nMaestro ATP User :)"

