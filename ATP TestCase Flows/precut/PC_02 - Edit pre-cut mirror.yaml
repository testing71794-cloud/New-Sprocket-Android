# TC_ID: PC_02 - Edit pre-cut mirror
appId: com.kodak.steptouch
name: PC_02 - Edit pre-cut mirror
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
  timeout: 2000
- assertVisible: "MY GALLERY"
- runFlow: subflows/reach_gallery_for_precut.yaml
- runFlow: subflows/create_precut_editor_ready.yaml
- runFlow: subflows/tap_precut_tile.yaml
- tapOn: "Mirror"
- tapOn:
    id: "button_save"
