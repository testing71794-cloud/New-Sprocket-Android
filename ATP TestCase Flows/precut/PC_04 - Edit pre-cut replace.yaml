# TC_ID: PC_04 - Edit pre-cut replace
appId: com.kodak.steptouch
name: PC_04 - Edit pre-cut replace
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
  timeout: 2000
- assertVisible: "MY GALLERY"
- runFlow: subflows/reach_gallery_for_precut.yaml
- runFlow: subflows/create_precut_editor_ready.yaml
- runFlow: subflows/tap_precut_tile.yaml
- tapOn: "Replace"
- tapOn:
    id: "image"
    index: 2
- tapOn: "Next"
- tapOn:
    id: "button_save"
