appId: com.kodak.steptouch
---
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "image"
    index: 0
    optional: true
- tapOn:
    point: "50%, 40%"
    label: Pre-cut sticker slot fallback
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(Mirror|Flip|Replace).*"
    timeout: 2000
