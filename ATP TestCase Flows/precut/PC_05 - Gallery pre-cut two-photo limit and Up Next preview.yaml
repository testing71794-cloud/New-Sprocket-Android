# TC_ID: PC_05 - Gallery pre-cut two-photo limit and Up Next preview
# ATP: Gallery multi-select pre-cut — two-photo limit, create pre-cut, Up Next toolbar
# Steps: gallery → select 3 photos → pre-cut (limit error) → deselect one → pre-cut → next → done
#         → open Up Next pre-cut preview → assert Collage and Pre-Cut Stickers actions
appId: com.kodak.steptouch
name: PC_05 - Gallery pre-cut two-photo limit and Up Next preview
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 2000
- extendedWaitUntil:
    visible: "Select"
    timeout: 2000
- tapOn: "Select"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 2000
- tapOn:
    id: "ivItemGridImage"
- tapOn:
    id: "ivItemGridImage"
    index: 1
- tapOn:
    id: "ivItemGridImage"
    index: 2
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "Pre-Cut \nStickers"
    timeout: 2000
- tapOn: "Pre-Cut \nStickers"
- extendedWaitUntil:
    visible: "You can select only 2 photos for Pre-Cut Stickers"
    timeout: 2000
- tapOn: "OK"
- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    id: "ivItemGridImage"
    index: 2
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "Pre-Cut \nStickers"
- runFlow:
    when:
      visible: "Remember to load your printer with Kodak 2x3 Pre-Cut Sticker Paper before using this feature!"
    commands:
      - tapOn: "OK"
- runFlow:
    when:
      visible: "Ok"
    commands:
      - tapOn: "Ok"
- extendedWaitUntil:
    visible: "Next"
    timeout: 2000
- tapOn: "Next"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible:
      id: "button_save"
    timeout: 2000
- tapOn:
    id: "button_save"
- waitForAnimationToEnd:
  timeout: 2000
- runFlow: subflows/dismiss_print_overlay_if_visible.yaml
- extendedWaitUntil:
    visible:
      id: "precutIV"
    timeout: 2000
- tapOn:
    id: "precutIV"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "Collage"
    timeout: 2000
- assertVisible: "Collage"
- assertVisible: "Pre-Cut \nStickers"
