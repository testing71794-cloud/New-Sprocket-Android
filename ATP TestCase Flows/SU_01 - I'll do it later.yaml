# TC_ID: SU_01 - I'll do it later
appId: com.kodak.steptouch
name: SU_01 - I'll do it later
---
# Launch app with fresh state
- launchApp:
    clearState: true

# Wait for app to load
- waitForAnimationToEnd:
  timeout: 2000

# Handle Camera permission
- runFlow:
    when:
      visible: "While using the app"
    commands:
      - tapOn: "While using the app"

# Handle Allow popup
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# Handle Android 13 permission text
- runFlow:
    when:
      visible: "Allow only while using the app"
    commands:
      - tapOn: "Allow only while using the app"

# Optional media permission
- runFlow:
    when:
      visible: "Select photos and videos"
    commands:
      - tapOn: "Allow"

# Continue onboarding flow
- runFlow:
    when:
      visible: "I’ll Do It Later"
    commands:
      - tapOn: "I’ll Do It Later"

- runFlow:
    when:
      visible: "Agree"
    commands:
      - tapOn: "Agree"