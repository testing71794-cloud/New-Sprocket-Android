# TC_ID: CA_E03 - Camera with low storage
# ATP Steps: 1. Open camera → 2. Capture photo → 3. Verify low-storage error message
# ATP Expected: When device storage is full, capturing a photo shows an appropriate error
# Note: Requires device near full storage; may be skipped in CI.
appId: com.kodak.steptouch
name: CA_E03 - Camera with low storage
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_camera.yaml
- runFlow: subflows/open_camera_bottom_right.yaml
- runFlow: subflows/capture_photo.yaml
- runFlow:
    when:
      visible: ".*(?i)(storage|space|full).*"
    commands:
      - assertVisible: ".*(?i)(storage|space|full).*"
