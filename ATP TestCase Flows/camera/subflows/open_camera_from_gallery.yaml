appId: com.kodak.steptouch
---
# Gallery → Camera (shared entry; same as working CA_01).
- runFlow:
    when:
      visible:
        id: camerIV
    commands:
      - tapOn:
          id: camerIV
- runFlow:
    when:
      notVisible:
        id: capture_img
    commands:
      - swipe:
          start: "12%, 55%"
          end: "82%, 55%"
- runFlow:
    when:
      notVisible:
        id: capture_img
    commands:
      - tapOn:
          point: "88%, 92%"
          label: Camera FAB fallback
- runFlow:
    when:
      visible: "Swipe left to apply live filters"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
- extendedWaitUntil:
    visible:
      id: capture_img
    timeout: 2000
