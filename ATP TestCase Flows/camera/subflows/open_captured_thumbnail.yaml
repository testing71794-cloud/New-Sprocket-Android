appId: com.kodak.steptouch
---
# Tap capture thumbnail at bottom-left after a photo is taken.
- runFlow:
    when:
      visible:
        id: imageViewPreview
    commands:
      - tapOn:
          id: imageViewPreview
- runFlow:
    when:
      visible:
        id: img_camera_menu
    commands:
      - tapOn:
          id: img_camera_menu
- runFlow:
    when:
      visible:
        id: camera_image
    commands:
      - tapOn:
          id: camera_image
- runFlow:
    when:
      notVisible: "Print"
    commands:
      - tapOn:
          point: 75%,90%
          label: Captured thumbnail fallback
- waitForAnimationToEnd:
    timeout: 2000
