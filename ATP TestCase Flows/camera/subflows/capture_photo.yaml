appId: com.kodak.steptouch
---
# Tap shutter (ATP builds use capture_img id).
- runFlow:
    when:
      visible:
        id: capture_img
    commands:
      - tapOn:
          id: capture_img
- runFlow:
    when:
      notVisible:
        id: capture_img
    commands:
      - tapOn:
          point: "50%, 90%"
          label: Capture button fallback
- waitForAnimationToEnd:
    timeout: 2000
