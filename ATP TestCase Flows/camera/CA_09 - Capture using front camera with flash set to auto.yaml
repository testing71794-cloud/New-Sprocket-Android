# TC_ID: CA_09 - Capture using front camera with flash set to auto
# ATP Steps: 1. Open app → 2. tap on the camera icon located at the bottom-right of the screen → 3. tap on the camera flip icon located at the bottom-right of the screen → 4. tap on the flash icon until the icon has an "A" to the right of it → 5. capture image
# ATP Expected: User should be able to capture using the front facing camera with auto front facing flash. If photo is taken in a dark setting, the auto flash should engage
appId: com.kodak.steptouch
name: CA_09 - Capture using front camera with flash set to auto
---
# Step 1: open app and reach gallery.
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_camera.yaml
# Step 2: tap on the camera icon located at the bottom-right of the screen.
- runFlow: subflows/open_camera_bottom_right.yaml
# Step 3: tap on the camera flip icon located at the bottom-right of the screen.
- runFlow: subflows/switch_to_selfie_camera.yaml
# Step 4: tap on the flash icon until the icon has an "A" to the right of it.
- runFlow: subflows/set_flash_auto.yaml
# Step 5: capture image.
- runFlow: subflows/capture_photo.yaml
- assertVisible:
    id: capture_img
