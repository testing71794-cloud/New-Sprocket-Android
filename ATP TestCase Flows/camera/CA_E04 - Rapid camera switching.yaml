# TC_ID: CA_E04 - Rapid camera switching
# ATP Steps: 1. Open camera → 2–4. Switch front/back camera three times → 5. Verify flip control and capture button remain available
# ATP Expected: User should be able to switch between front and rear cameras repeatedly without failure
appId: com.kodak.steptouch
name: CA_E04 - Rapid camera switching
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_camera.yaml
- runFlow: subflows/open_camera_bottom_right.yaml
- runFlow: subflows/switch_to_selfie_camera.yaml
- runFlow: subflows/switch_to_selfie_camera.yaml
- runFlow: subflows/switch_to_selfie_camera.yaml
- assertVisible:
    id: imgFlipCamera
- assertVisible:
    id: capture_img
