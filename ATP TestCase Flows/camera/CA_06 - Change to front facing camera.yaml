# TC_ID: CA_06 - Change to front facing camera
# ATP Steps: 1. Open app → 2. tap on the camera icon located at the bottom-right of the screen → 3. tap on the camera flip icon located at the bottom-right of the screen
# ATP Expected: User should be able to switch to the front facing camera of their mobile device
appId: com.kodak.steptouch
name: CA_06 - Change to front facing camera
---
# Step 1: open app and reach gallery.
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_camera.yaml
# Step 2: tap on the camera icon located at the bottom-right of the screen.
- runFlow: subflows/open_camera_bottom_right.yaml
# Step 3: tap on the camera flip icon located at the bottom-right of the screen.
- runFlow: subflows/switch_to_selfie_camera.yaml
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible:
    id: capture_img
- assertVisible:
    id: imgFlipCamera
