# TC_ID: CA_01 - Enter camera mode
# ATP Steps: 1. Open app → 2. I'll do it later → 3. Accept terms → 4. Skip onboarding → 5. Open camera from gallery → 6. Verify camera screen
# ATP Expected: User should be able to open the app's camera from the gallery
appId: com.kodak.steptouch
name: CA_01 - Enter camera mode
---
# Steps 1–4: cold start through gallery.
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_camera.yaml
# Step 5: open camera from gallery.
- runFlow: subflows/open_camera_from_gallery.yaml
# Step 6: verify camera UI.
- assertVisible:
    id: capture_img
- assertVisible:
    id: imgFlipCamera
- assertVisible:
    id: img_camera_menu
- assertVisible:
    id: back_button
