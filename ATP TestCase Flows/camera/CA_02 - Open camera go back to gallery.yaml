# TC_ID: CA_02 - Open camera go back to gallery
# ATP Steps: 1. Open app → 2. Tap camera icon (bottom-right) → 3. Tap return icon (top-left)
# ATP Expected: User should be able to open the app camera and go back to gallery
appId: com.kodak.steptouch
name: CA_02 - Open camera go back to gallery
---
# Step 1: open app and reach gallery.
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_camera.yaml
# Step 2: tap camera icon at bottom-right.
- runFlow: subflows/open_camera_from_gallery.yaml
- assertVisible:
    id: capture_img
# Step 3: tap return at top-left.
- runFlow: subflows/close_camera_to_gallery.yaml
- assertVisible:
    text: ".*(?i)my gallery.*"
