# ATP Test Case ID: LO_08
# HP Sprocket — forgot password from email login form
appId: com.hp.impulse.sprocket
name: "LO_08 - Log in with Email forgot password"
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_login_email_form.yaml
- tapOn: "Forgot password?"
- waitForAnimationToEnd:
    timeout: 3000
- runFlow:
    when:
      visible: "Email*"
    commands:
      - tapOn: "Email*"
      - inputText: niteshmehra56@gmail.com
- runFlow:
    when:
      visible: "Email"
    commands:
      - tapOn: "Email"
      - inputText: niteshmehra56@gmail.com
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Send Recovery Email"

    commands:
      - tapOn: "Send Recovery Email"
- waitForAnimationToEnd
- assertVisible: "Got it!"
- assertVisible: "Check your email for a password recovery link"

- extendedWaitUntil:
    visible: "Back to Log In"
    timeout: 1000
- tapOn: "Back to Log In"
- assertVisible: "Log In with Email"
