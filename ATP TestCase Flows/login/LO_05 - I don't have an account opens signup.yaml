# ATP Test Case ID: LO_05
# I don't have an account — returns to Sign up options
appId: com.hp.impulse.sprocket
name: "LO_05 - I don't have an account opens signup"
tags:
  - login
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/open_login_screen.yaml
- tapOn: "I don't have an account"
- waitForAnimationToEnd:
    timeout: 3000
- extendedWaitUntil:
    visible: "Sign up"
    timeout: 15000
- runFlow: ../common/subflows/assert_signup_options_screen.yaml
