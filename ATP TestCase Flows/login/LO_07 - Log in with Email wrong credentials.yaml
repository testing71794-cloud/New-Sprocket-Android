# ATP Test Case ID: LO_07
# HP Sprocket — email login wrong credentials alert
appId: com.hp.impulse.sprocket
name: "LO_07 - Log in with Email wrong credentials"
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_login_email_form.yaml
- tapOn: "Email"
- inputText: definitely.not.a.real.user@example.com
- tapOn: "Password"
- inputText: WrongPass999!
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Log In"
- waitForAnimationToEnd
- assertVisible: "Log In with Email"
- assertVisible: "No account found for this email address"

