appId: com.hp.impulse.sprocket
---
# Enter Facebook credentials when login form is shown (any language). Kodak SE_06 creds.
- runFlow:
    when:
      visible: "Password"
      notVisible: "Continue as"
    commands:
      - runFlow: dismiss_facebook_language_picker.yaml
      - tapOn:
          text: "Mobile number or email"
          optional: true
      - tapOn:
          text: "Mobile number or email address"
          optional: true
      - tapOn:
          text: "Email or phone"
          optional: true
      - tapOn:
          id: "m_login_email"
          optional: true
      - inputText: "cplusadev@gmail.com"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          text: "Password"
          optional: true
      - tapOn:
          id: "m_login_password"
          optional: true
      - inputText: "CAglobal@127"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          text: "Log In"
          retryTapIfNoChange: true
      - tapOn:
          text: "Log in"
          optional: true
      - tapOn:
          point: "50%, 72%"
          optional: true
      - waitForAnimationToEnd:
          timeout: 8000
