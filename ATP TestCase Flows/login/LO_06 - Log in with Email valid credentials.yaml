# ATP Test Case ID: LO_06
# HP Sprocket — email login valid credentials → Terms
appId: com.hp.impulse.sprocket
name: "LO_06 - Log in with Email valid credentials"
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_login_email_form.yaml
- tapOn: "Email"
- inputText: Niteshmehra56@gmail.com
- tapOn: "Password"
- inputText: 252546Nm#
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Log In"
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible: "Log in"
- assertVisible: "Printer\nTab 3 of 3"
- assertVisible: "Welcome,\nNitesh :)"
