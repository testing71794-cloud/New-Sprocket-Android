# ATP Test Case ID: SP_02
# Video t03–t04 — splash resolves to first interactive screen
appId: com.hp.impulse.sprocket
name: "SP_02 - Splash to first interactive screen"
---
- launchApp:
    clearState: true
- runFlow: ../common/subflows/wait_after_cold_launch.yaml
- runFlow:
    when:
      visible: "Welcome to the new Sprocket!"
    commands:
      - assertVisible: "Enjoy the revamped Sprocket experience with intuitive navigation."
      - assertVisible: "Swipe to continue."
- runFlow:
    when:
      visible: "Sign up"
    commands:
      - assertVisible: "Sign up with Google"
      - assertVisible: "Sign up with Email"
      - assertVisible: "Sign Up Later"
