appId: com.kodak.steptouch
---
# BA_01 must prove a fresh pair — auto-connect skips the connect steps and false-passes on gallery.
- runFlow:
    when:
      visible:
        id: "linearLayoutConnection"
    commands:
      - runFlow: disconnect_barbie_printer.yaml
      - extendedWaitUntil:
          notVisible:
            id: "linearLayoutConnection"
          timeout: 2000
- assertNotVisible:
    id: "linearLayoutConnection"
