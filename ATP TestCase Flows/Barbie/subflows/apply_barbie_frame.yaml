appId: com.kodak.steptouch
---
# Steps 5–8: Frames → Barbie category → select frame → apply check mark.
- tapOn: "Frames"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "Barbie"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "imageViewFilter"
    index: 2
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "saveRecentEditImageView"
    optional: true
- tapOn:
    text: "Done"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
