appId: com.kodak.steptouch
---
# BA_01 steps 2–4. Always runs full connect — never skips when gallery icon looks connected.
# Barbie theme is enabled once a Barbie Step printer is connected.
# Env: BT_DEVICE_NAME or BT_BARBIE_DEVICE_NAME (exact Bluetooth list label).
- runFlow: ensure_disconnected_for_barbie_connect.yaml

# Step 2: Tap Bluetooth icon top-right (CO_01).
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd:
    timeout: 2000

- runFlow:
    when:
      visible: "Printer Not Connected"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: "Connect"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: "Searching for your device..."
    commands:
      - extendedWaitUntil:
          notVisible: "Searching for your device..."
          timeout: 2000
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: "We couldn't find"
    commands:
      - tapOn: "Search Again"
      - waitForAnimationToEnd:
          timeout: 2000

# Step 3: Select Barbie printer by name (fails if printer not in list).
- runFlow: pick_barbie_printer_by_name.yaml
- waitForAnimationToEnd:
    timeout: 2000

- runFlow:
    when:
      notVisible:
        id: "linearLayoutConnection"
    commands:
      - tapOn:
          point: "39%,20%"
          label: Device list fallback after name tap (CO_01)
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: "Connect"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000

# Step 4: Confirm pairing.
- runFlow: confirm_pairing_required.yaml

- repeat:
    times: 4
    commands:
      - runFlow:
          when:
            notVisible:
              id: "linearLayoutConnection"
          commands:
            - runFlow:
                when:
                  visible: "Connect"
                commands:
                  - tapOn: "Connect"
                  - waitForAnimationToEnd:
                      timeout: 2000
                  - runFlow: confirm_pairing_required.yaml
            - runFlow:
                when:
                  visible: "Search Again"
                commands:
                  - tapOn: "Search Again"
                  - waitForAnimationToEnd:
                      timeout: 2000

# Fail unless printer is actually connected (not gallery-only pass).
- assertVisible:
    id: "linearLayoutConnection"
- assertNotVisible:
    text: "Printer Not Connected"
