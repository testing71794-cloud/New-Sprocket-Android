appId: com.kodak.steptouch
---
# Step 3: Tap the Barbie printer in the list (name required — no silent coordinate skip).
# Env: BT_BARBIE_DEVICE_NAME and/or BT_DEVICE_NAME must match the list label exactly.
- runFlow:
    when:
      visible:
        text: ${BT_BARBIE_DEVICE_NAME}
    commands:
      - tapOn:
          text: ${BT_BARBIE_DEVICE_NAME}

- runFlow:
    when:
      notVisible:
        text: ${BT_BARBIE_DEVICE_NAME}
    commands:
      - extendedWaitUntil:
          visible:
            text: ${BT_DEVICE_NAME}
          timeout: 2000
      - tapOn:
          text: ${BT_DEVICE_NAME}
