# TC_ID: BA_04 - Barbie Frames
# ATP Description: Apply Barbie frames
# ATP Steps: 1. Repeat BA_01 → 2. Select photo → 3. Tap overlay away → 4. Edit → 5. Frames → 6. Barbie → 7. Select frame → 8. Apply check mark
# ATP Expected: User can select and add a Barbie frame to the selected photo
# Note: Barbie theme is enabled once a Barbie Step printer is connected.
# Env: BT_BARBIE_DEVICE_NAME
appId: com.kodak.steptouch
name: BA_04 - Barbie Frames
---
- launchApp:
    clearState: false
- runFlow: subflows/dismiss_barbie_intro_if_visible.yaml
- runFlow: subflows/select_photo_and_open_edit.yaml
- runFlow: subflows/apply_barbie_frame.yaml
- assertVisible:
    id: "filterEditingOptionsImageView"
    optional: true
