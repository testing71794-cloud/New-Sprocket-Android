# ATP Test Case ID: QP_15
# Quick print_15 — Tag Search Success after Facebook login
appId: com.hp.impulse.sprocket
name: "QP_15 - Tag search success"
tags:
  - quick-print
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_quick_print_gallery.yaml
- runFlow: subflows/open_select_gallery.yaml
- tapOn: ".*Facebook.*"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow: ../login/subflows/complete_facebook_sign_in.yaml
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    point: "50%,40%"
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    point: "88%,88%"
- waitForAnimationToEnd:
    timeout: 2000
- inputText: "#nature"
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: ".*(?i)(#nature|nature|No photos|photos).*"
    optional: true
