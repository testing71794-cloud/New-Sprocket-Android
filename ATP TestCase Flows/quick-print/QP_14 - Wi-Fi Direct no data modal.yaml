# ATP Test Case ID: QP_14
# Quick print_14 — Wi-Fi Direct no-data modal → No Internet
# Prerequisite: phone on printer AP / Wi-Fi Direct without cellular data.
appId: com.hp.impulse.sprocket
name: "QP_14 - Wi-Fi Direct no data modal"
tags:
  - quick-print
  - mixed
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_quick_print_gallery.yaml
- runFlow: subflows/open_select_gallery.yaml
- tapOn: ".*Facebook.*"
- waitForAnimationToEnd:
    timeout: 8000
- assertVisible:
    text: ".*(?i)(Wi-?Fi Direct|no data|internet|OK).*"
    optional: true
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    text: ".*(?i)(No Internet|No internet|Open settings).*"
    optional: true
