# ATP Test Case ID: QP_17
# Quick print_17 — Sort menu Newest/Oldest interaction
appId: com.hp.impulse.sprocket
name: "QP_17 - Sorting and interaction constraints"
tags:
  - quick-print
  - mixed
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_quick_print_gallery.yaml
- runFlow: subflows/open_sort_menu.yaml
# Tap photo while menu open — should dismiss / not select
- tapOn:
    point: "15%,40%"
- waitForAnimationToEnd:
    timeout: 1000
- runFlow: subflows/open_sort_menu.yaml
- runFlow: subflows/tap_sort_oldest.yaml
- assertVisible: "Recent"
- runFlow: subflows/open_sort_menu.yaml
- runFlow: subflows/tap_sort_newest.yaml
- assertVisible: "Recent"
