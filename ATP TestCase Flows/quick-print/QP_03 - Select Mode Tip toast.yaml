# ATP Test Case ID: QP_03
# Quick print 03 — Select Mode Tip toast (5s) and same-session rules
appId: com.hp.impulse.sprocket
name: "QP_03 - Select Mode Tip toast"
tags:
  - quick-print
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_create_home.yaml
- tapOn: ".*Quick Print.*"
- waitForAnimationToEnd:
    timeout: 1500
- runFlow: ../permission/subflows/allow_photos_all_permission.yaml
# Tip toast may appear briefly after open
- assertVisible:
    text: ".*(?i)(long.?press|select|hold|tip).*"
    optional: true
- extendedWaitUntil:
    visible: "Recent"
    timeout: 10000
- assertVisible: "Recent"
# Leave via back, re-enter same session — tip should not repeat
- back
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: ".*Quick Print.*"
    timeout: 8000
- tapOn: ".*Quick Print.*"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "Recent"
