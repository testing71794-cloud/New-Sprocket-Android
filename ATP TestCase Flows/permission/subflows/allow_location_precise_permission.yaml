appId: com.hp.impulse.sprocket
---
# Video ~00:14–00:16 — Location permission (Precise + while using the app).
- runFlow:
    when:
      visible: ".*access this device.*location.*"
    commands:
      - tapOn:
          text: "Precise"
          optional: true
      - tapOn: "While using the app"
      - waitForAnimationToEnd:
          timeout: 2000
