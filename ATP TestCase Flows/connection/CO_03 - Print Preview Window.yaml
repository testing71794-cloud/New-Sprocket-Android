# TC_ID: CO_03 - Print Preview Window
# ATP Steps: 1. Open app → 2. tap image → 3. print (bottom-right) → 4. red print (top-right) → 5. pick device → 6. confirm pairing
# ATP Expected: User should be able to connect through the print window
# Env: BT_DEVICE_NAME
appId: com.kodak.steptouch
name: CO_03 - Print Preview Window
---
- launchApp:
    clearState: false
- assertVisible: "My gallery"
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
# Step 2: tap image to open.
- tapOn:
    point: "50%, 45%"
    label: Gallery thumbnail

- tapOn:
    text: "Print"
    optional: true
# Step 4: red print button top-right on print screen.
- tapOn:
    text: "Print"
    label: Red print top-right
    optional: true
# Step 5: pick available device.
- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    point: 21%,13%
# Step 6: confirm pairing.
- runFlow: subflows/pairing_optional.yaml
- assertVisible:
    id: "linearLayoutConnection"
    optional: true
- tapOn:
      point: 27%,19%
- assertVisible: "Pre-Cut \nStickers"

- assertVisible: "Collage"


