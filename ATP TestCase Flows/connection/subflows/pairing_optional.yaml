appId: com.kodak.steptouch
---
# System / OEM pairing sheets differ; keep taps optional where wording varies.
- runFlow:
    when:
      visible: "Bluetooth pairing request"
    commands:
      - tapOn:
          text: "Pair"
          optional: true
      - tapOn:
          text: "PAIR"
          optional: true

- tapOn:
    text: "Pair"
    optional: true
    label: Android pairing – Pair
- tapOn:
    text: "PAIR"
    optional: true
- tapOn:
    text: "Pair & connect"
    optional: true
- tapOn:
    text: "Connect"
    optional: true

- runFlow:
    when:
      visible:
        text: ".*Pair with Kodak.*"
    commands:
      - tapOn:
          text: "Pair"
          optional: true
