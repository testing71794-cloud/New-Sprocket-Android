# TC_ID: CO_04 - Auto-connect
# ATP Steps: 1. Printer previously connected → 2. printer on → 3. open app
# ATP Expected: Printer auto-connects; gallery printer icon is colored (not grey/white + red BT badge)
appId: com.kodak.steptouch
name: CO_04 - Auto-connect
---
# Precondition: printer paired on device. clearState false keeps bond for auto-connect.
- launchApp:
    clearState: false
- assertVisible: "MY GALLERY"
- waitForAnimationToEnd:
  timeout: 2000
- runFlow: subflows/assert_printer_icon_connected.yaml
