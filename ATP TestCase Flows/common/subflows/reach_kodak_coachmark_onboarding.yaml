appId: com.hp.impulse.sprocket
---
# Video ~00:06–00:11 — Kodak-style coachmark after terms (Skip / Next).
- runFlow:
    when:
      visible: "Start a quick tour"
    commands:
      - tapOn: "Start a quick tour"
      - waitForAnimationToEnd:
          timeout: 2000
- extendedWaitUntil:
    visible: "Skip"
    timeout: 8000
    optional: true
- assertVisible:
    text: "Switch Between\nCamera and Gallery"
    optional: true
- assertVisible:
    text: "Swipe to take photo"
    optional: true
