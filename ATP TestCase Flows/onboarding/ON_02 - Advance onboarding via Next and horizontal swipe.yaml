# TC_ID: ON_02 - Advance onboarding via Next and horizontal swipe
# ATP Steps: 1. Open app → 2. I'll do it later → 3. Agree to terms → 4. tap Next → 5. slide left to right
# ATP Expected: User should be able to change slides by tapping Next or by sliding side to side
appId: com.kodak.steptouch
name: "ON_02 - Advance onboarding via Next and horizontal swipe"
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_onboarding_after_terms.yaml

- assertVisible: "Switch Between\nCamera and Gallery"
- tapOn: "Next"
- assertVisible: "Tap to \nAdjust Your \nGallery View"
- swipe:
    direction: LEFT
- assertVisible: "Check Printer\nConnectivity \nStatus"
- tapOn: "Next"
- assertVisible: "Take New  Photo"
- swipe:
    direction: LEFT
- assertVisible: "Create Collage From Selected Photos"
- tapOn: "Next"
- assertVisible: "Before You Edit or Print"
- swipe:
    direction: LEFT
- assertVisible: "Edit Your Photos"
- tapOn: "Next"
- assertVisible: "Create Pre-Cut Stickers"
- swipe:
    direction: LEFT
- assertVisible: "Create a Collage"
- tapOn: "Next"
- assertVisible: "Select two photos, print and then peel off the stickers"
- swipe:
    direction: LEFT
- assertVisible: "Customize Your Collage"
- tapOn: "Next"
- assertVisible: "Set number of copies \nor adjust color"
- swipe:
    direction: LEFT
- assertVisible: "Thank You!"
- assertVisible: "Finish App Tour"
- extendedWaitUntil:
    visible: "Start"
    timeout: 2000
- tapOn: "Finish App Tour"
- assertVisible: "Switch Between\nCamera and Gallery"
- tapOn:
    id: "ivItemGridImage"
    index: 3
- assertVisible: "MY GALLERY"

