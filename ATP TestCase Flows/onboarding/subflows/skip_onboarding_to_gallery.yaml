appId: com.hp.impulse.sprocket
---
# Sign Up Later → optional coachmark → permissions → Create home (Sprocket).
# Kodak "Skip" coachmark is optional — many builds go straight to permissions/home.
- runFlow: ../../common/subflows/reach_signup_screen.yaml
- tapOn: "Sign Up Later"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: ../../common/subflows/accept_terms_if_visible.yaml
- runFlow: ../../common/subflows/reach_kodak_coachmark_onboarding.yaml
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow: ../../permission/subflows/allow_all_runtime_permissions.yaml
- runFlow: ../../gallery/subflows/dismiss_gallery_coachmark_if_visible.yaml
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: ".*Create.*"
    commands:
      - tapOn: ".*Create.*"
- extendedWaitUntil:
    visible: ".*(?i)(Collage Maker|Quick Print|Create).*"
    timeout: 15000
- assertVisible: ".*(?i)(Collage Maker|Quick Print).*"
