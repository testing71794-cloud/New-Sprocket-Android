# TC_ID: GA_03 - Gallery select album
appId: com.kodak.steptouch
name: GA_03 - Gallery select album
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_gallery.yaml
- runFlow: subflows/open_gallery_dropdown.yaml
- tapOn:
    text: "All Photos"
    optional: true
- tapOn:
    text: ".*(?i)all photos.*"
    optional: true
- waitForAnimationToEnd:
  timeout: 2000
- assertVisible:
    id: "ivItemGridImage"
    index: 4

