# TC_ID: GA_07 - Refresh gallery (pull down)
appId: com.kodak.steptouch
name: GA_07 - Refresh gallery (pull down)
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "MY GALLERY"
- swipe:
    start: "50%, 20%"
    end: "50%, 75%"
    label: Pull to refresh
- assertVisible:
    id: "ivItemGridImage"
    index: 2

