# TC_ID: GA_05 - Pinch to zoom out
appId: com.kodak.steptouch
name: GA_05 - Pinch to zoom out
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: "MY GALLERY"
- tapOn:
    id: "ivItemGridImage"
    index: 4

- swipe:
    start: "50%, 50%"
    end: "75%, 75%"
    label: Zoom-out gesture part 1
- swipe:
    start: "50%, 50%"
    end: "25%, 25%"
    label: Zoom-out gesture part 2
- waitForAnimationToEnd:
    timeout: 2000
