# TC_ID: GA_11 - Open photo then edit and save
appId: com.kodak.steptouch
name: GA_11 - Open photo then edit and save
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
  timeout: 2000
- assertVisible: "MY GALLERY"
- doubleTapOn:
    id: "relativeLayoutItem"
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - tapOn: "Ok"
      - tapOn: "OK"
- tapOn:
    id: "linearlayout_edit_photo"
    repeat: 2
    delay: 200
- extendedWaitUntil:
    visible:
      id: "filterEditingOptionsImageView"
    timeout: 2000
- tapOn:
    id: "filterEditingOptionsImageView"
    index: 4
- runFlow:
    when:
      visible:
        id: "saveRecentEditImageView"
    commands:
      - tapOn:
          id: "saveRecentEditImageView"
- tapOn: "Done"
- tapOn:
    id: "image_cross"
    repeat: 1
    delay: 200
- tapOn: "SAVE"
- assertVisible: "MY GALLERY"

