- assertVisible: "Pre-Cut Stickers"
- assertVisible: "Print stickers of 2 photos"

- assertVisible: "Tile Print"
- assertVisible: "Print a large photo by using multiple sheets of paper"

- assertVisible: "Photobooth"
- assertVisible: "Snap a 4-photo collage"

- assertVisible: "Photo ID"
- assertVisible: "Snap ID-ready photos"

# Bottom Navigation
- assertVisible: "More"
- assertVisible: "Create"
- assertVisible: "Printer"
