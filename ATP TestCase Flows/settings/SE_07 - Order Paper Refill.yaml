# TC_ID: SE_07 - Order Paper Refill
# ATP Steps: 1. Open app → 2. settings (gear) top-left → 3. tap "Order paper refill"
# ATP Expected: Paper refill window with 2x3 paper info and Purchase paper button
appId: com.kodak.steptouch
name: SE_07 - Order Paper Refill
---
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
# Step 3: tap "Order paper refill".
- tapOn:
    text: "Order paper refill"
    optional: true
- tapOn:
    text: "Order Paper Refill"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)Out of Printer Paper.*"
    timeout: 2000
- assertVisible:
    text: ".*(?i)Purchase\n Paper.*"

- tapOn: "Purchase\n Paper"
- assertVisible: "Visit the KODAK Store"
# KODAK Store is WebView-heavy; scrollUntilVisible often cannot see in-page text.
- extendedWaitUntil:
    visible:
      text: ".*(?i)Kodak 2.*x3.*Premium Zink Photo Paper.*"
    timeout: 2000
- assertVisible:
    text: ".*(?i)Paper[- ]?made Perfection.*"


