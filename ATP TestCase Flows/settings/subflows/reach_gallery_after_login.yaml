appId: com.kodak.steptouch
---
# After LOGIN: terms/onboarding overlay, then gallery home (max 2s waits).
- extendedWaitUntil:
    visible:
      text: ".*(?i)(my gallery|all photos|agree terms and conditions|start a quick tour|skip).*"
    timeout: 2000
- runFlow:
    when:
      visible: "Agree Terms and Conditions"
    commands:
      - tapOn: "Agree Terms and Conditions"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow: advance_after_terms_for_settings.yaml
- tapOn:
    text: "Skip"
    optional: true
- extendedWaitUntil:
    visible:
      text: ".*(?i)(my gallery|all photos).*"
    timeout: 2000
