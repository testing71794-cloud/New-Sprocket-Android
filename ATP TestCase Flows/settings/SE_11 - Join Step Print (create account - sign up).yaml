# TC_ID: SE_11 - Join Step Print (create account / sign up)
# ATP Steps: 1. Open app → 2. Settings → Join StepPrint → 3–5. Sign up & agree terms → 6. Settings → 7. Assert Logout & Delete account
#   → 8. Delete account → 9. Confirm popup → 10. Assert deleted message → 11. OK → 12. Assert join/sign-up screen
# ATP Expected: User can join, delete account with confirmation, then return to create-account screen
appId: com.kodak.steptouch
name: SE_11 - Join Step Print (create account / sign up)
---
- launchApp:
    clearState: true
- runFlow: subflows/open_app_to_gallery.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
- tapOn: "Join StepPrint"
# Step 2: verify join / create-account screen.
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "Log In"
# Step 3–4: enter details and sign up.
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- runScript: ../signup-login/scripts/gen_unique_email.js
- tapOn: "Email*"
- inputText: ${output.signupEmail}
- tapOn: "Password*"
- inputText: Test12345#
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
# Step 5: agree to terms (join flow completion).
- runFlow: ../signup-login/handle_optional_permissions_loop.yaml
- runFlow:
    when:
      visible: "Agree Terms and Conditions"
    commands:
      - tapOn: "Agree Terms and Conditions"
      - waitForAnimationToEnd:
          timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(?i)(my gallery|start a quick tour|skip|agree terms).*"
    timeout: 2000
# Reach gallery after sign-up (skip onboarding overlay if shown).
- runFlow: subflows/advance_after_terms_for_settings.yaml
- tapOn:
    text: "Skip"
    optional: true
- extendedWaitUntil:
    visible: "My gallery"
    timeout: 2000
# Step 6: open settings again (stay on gallery; do not open a photo first).
- runFlow: subflows/tap_settings_gear.yaml
- extendedWaitUntil:
    visible:
      text: ".*(?i)(quick tips|support|share settings|order paper refill|legal|about|join stepprint|logout|delete account).*"
    timeout: 2000
# Step 7: verify account actions visible for signed-in user.
- extendedWaitUntil:
    visible:
      text: ".*(?i)log\\s*out.*"
    timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(?i)delete.*account.*"
    timeout: 2000
- assertVisible:
    text: ".*(?i)log\\s*out.*"
- assertVisible:
    text: ".*(?i)delete.*account.*"
# Step 8: tap Delete account.
- tapOn:
    id: "delete_account_textview"
- waitForAnimationToEnd:
    timeout: 2000
# Step 9: assert confirmation popup, then tap Delete.
- extendedWaitUntil:
    visible:
      text: ".*(?i)(are you sure|delete your account|permanently|cannot be undone).*"
    timeout: 2000
- assertVisible: "Cancel"
- assertVisible: "Delete"
- tapOn: "Delete"
- waitForAnimationToEnd:
    timeout: 2000
# Step 10: assert account-deleted success dialog text.
- extendedWaitUntil:
    visible:
      text: ".*(?i)(account deleted|deleted successfully|account has been deleted).*"
    timeout: 2000
- assertVisible:
    text: ".*(?i)(account deleted|deleted successfully|account has been deleted).*"
- assertVisible: "OK"
# Step 11: dismiss success dialog.
- tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 2000
# Step 12: assert join / create-account screen (logged-out state).
- extendedWaitUntil:
    visible: "Create an account"
    timeout: 2000
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "Log In"
- assertNotVisible:
    text: ".*(?i)log\\s*out.*"
    optional: true
- assertNotVisible:
    id: "delete_account_textview"
    optional: true
