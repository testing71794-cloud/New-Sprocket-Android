# TC_ID: SE_12 - Log in from (JoinStepprint) and log out
# ATP Steps: 1. Open app → 2. Settings → Join StepPrint → 3. Log In → 4. Login (QC_Nitesh@yopmail.com)
#   → 5. Gallery → 6. Settings → 7. Assert settings menu → 8. Logout → Sign out → Create account
# ATP Expected: Existing user logs in from settings, sees full settings menu, logs out to create-account screen
appId: com.kodak.steptouch
name: SE_12 - Log in from (JoinStepprint) and log out
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_gallery_for_settings.yaml
- runFlow: subflows/open_settings_from_gallery.yaml
- extendedWaitUntil:
    visible:
      text: ".*(?i)(join stepprint|quick tips|support).*"
    timeout: 2000
# Step 2: open join flow from settings (tap join row).
- tapOn:
    id: "text_join"
- tapOn:
    text: "Join StepPrint"
    optional: true
# Step 3: go to Log In screen.
- assertVisible: "Create an account"
- assertVisible: "Log In"
- tapOn: "Log In"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "LOGIN"
    timeout: 2000
- assertVisible: "Email"
- assertVisible: "Password"
- assertVisible: "LOGIN"
# Step 4: enter existing account credentials and log in.
- tapOn:
    id: "fragment_login_email"
- inputText: "QC_Nitesh@yopmail.com"
- tapOn:
    id: "fragment_login_password"
- inputText: "252546Nm#"
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "fragment_login_do_login"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: subflows/reach_gallery_after_login.yaml
# Step 6–7: open settings and assert all menu items.
- runFlow: subflows/tap_settings_gear.yaml
- extendedWaitUntil:
    visible:
      text: ".*(?i)(quick tips|support|share settings|order paper refill|legal|about).*"
    timeout: 2000
- runFlow: subflows/assert_settings_menu.yaml
- extendedWaitUntil:
    visible:
      text: ".*(?i)log\\s*out.*"
    timeout: 2000
- assertVisible:
    text: ".*(?i)log\\s*out.*"
- assertVisible:
    text: ".*(?i)delete.*account.*"
    optional: true
# Step 8: logout → confirm → sign out.
- tapOn:
    text: ".*(?i)log\\s*out.*"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(?i)are you sure you want to log out.*"
    timeout: 2000
- assertVisible:
    text: ".*(?i)are you sure you want to log out.*"
- tapOn:
    text: ".*(?i)sign\\s*out.*"
- waitForAnimationToEnd:
    timeout: 2000
# Step 9: redirected to create-account screen.
- extendedWaitUntil:
    visible: "Create an account"
    timeout: 2000
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "Log In"
- assertNotVisible:
    text: ".*(?i)log\\s*out.*"
    optional: true
