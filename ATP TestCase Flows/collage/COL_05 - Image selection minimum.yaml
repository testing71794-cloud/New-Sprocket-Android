# ATP Test Case ID: COL_05
# Collage_05 — Image Selection: min 2 photos enables Next
appId: com.hp.impulse.sprocket
name: "COL_05 - Image selection minimum"
tags:
  - collage
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_collage_maker.yaml
- tapOn:
    point: "18%,56%"
- waitForAnimationToEnd:
    timeout: 1000
# Green badge / slot 1 filled; second slot becomes active
- assertVisible: "1"
- assertVisible: "2"
- tapOn: "Next"
- waitForAnimationToEnd:
    timeout: 1500
# Still on selection with only one photo
- assertVisible: "Select 2 to 4 photos"
- tapOn:
    point: "50%,56%"
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible: "1"
- assertVisible: "2"
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Drag & Drop to Reorder"
    timeout: 8000
- assertVisible: "Drag & Drop to Reorder"
