# ATP Test Case ID: COL_15
# Collage_15 — Printer Validation: No Printer Added without connection
appId: com.hp.impulse.sprocket
name: "COL_15 - Printer validation"
tags:
  - collage
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_collage_maker.yaml
- runFlow: subflows/create_collage_two_photos_sprocket.yaml
- runFlow: subflows/advance_to_print_preview.yaml
# Without a connected printer — empty printer state
- assertVisible: ".*(?i)(No Printers Added|No Printer Added).*"
- assertVisible: "Add Printer"
- tapOn: "Add Printer"
- waitForAnimationToEnd:
    timeout: 4000
# Printer connection / pick UI (device-dependent); return if still on preview
- runFlow:
    when:
      visible: ".*(?i)(Add Printer|No Printers Added|No Printer Added|Copies).*"
    commands:
      - assertVisible: ".*(?i)(Add Printer|No Printers Added|No Printer Added|Copies).*"
- runFlow:
    when:
      notVisible: "Copies"
    commands:
      - back
      - waitForAnimationToEnd:
          timeout: 2000
      - assertVisible:
          text: ".*(?i)(Copies|Add Printer|No Printers Added|No Printer Added).*"
          optional: true
# Printer name after connect is environment-dependent; assert empty state was shown above.
