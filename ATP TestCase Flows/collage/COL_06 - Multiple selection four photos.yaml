# ATP Test Case ID: COL_06
# Collage_06 — Multiple Selection: select up to four photos
appId: com.hp.impulse.sprocket
name: "COL_06 - Multiple selection four photos"
tags:
  - collage
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_collage_maker.yaml
- runFlow: subflows/select_four_photos_fast.yaml
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: "1"
- assertVisible: "2"
- assertVisible: "3"
- assertVisible: "4"
- assertVisible: "Next"
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Drag & Drop to Reorder"
    timeout: 8000
- assertVisible: "Drag & Drop to Reorder"
