# TC_ID: COL_08 - Open photo then collage
# Sheet: open photo > collage (after MG_22)
# Steps: open photo → tap collage → create collage window
appId: com.kodak.steptouch
name: COL_08 - Open photo then collage
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/open_photo.yaml
- tapOn: "Collage"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "CREATE COLLAGE"
    timeout: 2000
- assertVisible: "CREATE COLLAGE"
