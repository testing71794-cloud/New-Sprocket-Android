# TC_ID: COL_09 - Open photo collage and save
# Sheet: open photo > collage > save (after MG_22)
# Steps: open photo → return to gallery → create collage (MG_15) → save
appId: com.kodak.steptouch
name: COL_09 - Open photo collage and save
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: subflows/reach_gallery_for_collage.yaml
- runFlow: subflows/reach_gallery_fast.yaml
- runFlow: subflows/open_photo.yaml
- pressKey: back
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 2000
- runFlow: subflows/create_collage_editor_ready.yaml
- runFlow: subflows/save_collage_from_preview.yaml
