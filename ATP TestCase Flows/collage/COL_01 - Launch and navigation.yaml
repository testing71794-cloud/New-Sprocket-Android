# ATP Test Case ID: COL_01
# Collage_01 — Launch & Navigation: splash → onboarding → Sign Up Later → Home
appId: com.hp.impulse.sprocket
name: "COL_01 - Launch and navigation"
tags:
  - collage
  - positive
---
- launchApp:
    clearState: true
- runFlow: ../common/subflows/wait_after_cold_launch.yaml
# Splash / first interactive onboarding
- assertVisible: "Welcome to the new Sprocket!"
- assertVisible: "Swipe to continue."
- runFlow: ../common/subflows/complete_sprocket_carousel.yaml
- extendedWaitUntil:
    visible: "Sign up"
    timeout: 15000
- assertVisible: "Sign up"
- assertVisible: "Sign Up Later"
- runFlow: subflows/sign_up_later_to_create.yaml
# Home (Create) with Collage Maker
- assertVisible: ".*Collage Maker.*"
- assertVisible: ".*Combine multiple photos.*"
- assertVisible: ".*Create.*"
- assertVisible: ".*More.*"
- assertVisible: ".*Printer.*"
