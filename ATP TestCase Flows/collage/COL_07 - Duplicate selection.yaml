# ATP Test Case ID: COL_07
# Collage_07 — Duplicate Selection: same gallery image in all four slots
appId: com.hp.impulse.sprocket
name: "COL_07 - Duplicate selection"
tags:
  - collage
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_collage_maker.yaml
- runFlow: subflows/select_same_photo_four_times.yaml
# Duplicates show as badges 1–4 on the same thumbnail; slots may not keep text "1"
- assertVisible: "Select 2 to 4 photos"
- assertVisible: "Next"
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Drag & Drop to Reorder"
    timeout: 8000
- assertVisible: "Drag & Drop to Reorder"
- assertVisible: "Layout"
