# ATP Test Case ID: COL_04
# Collage_04 — Folder Navigation: Recent → select another folder → gallery refreshes
appId: com.hp.impulse.sprocket
name: "COL_04 - Folder navigation"
tags:
  - collage
  - positive
---
- launchApp:
    clearState: true
- runFlow: subflows/reach_collage_maker.yaml
- runFlow: subflows/open_recent_folder_picker.yaml
- runFlow:
    when:
      visible: "Select Gallery"
    commands:
      - assertVisible: "Select Gallery"
      - swipe:
          direction: UP
          duration: 500
      - tapOn: ".*Camera.*"
      - waitForAnimationToEnd:
          timeout: 3000
      - assertVisible: "Camera"
- runFlow:
    when:
      visible: ".*Camera.*"
      notVisible: "Select Gallery"
    commands:
      - assertVisible: "Camera"
- assertVisible: "Select 2 to 4 photos"
- assertVisible: "Next"
