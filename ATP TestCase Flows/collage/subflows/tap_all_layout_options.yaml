appId: com.hp.impulse.sprocket
---
# Tap each layout chip under Layout (unlabeled ImageViews).
- assertVisible: "Layout"
- tapOn:
    point: "15%,78%"
- waitForAnimationToEnd:
    timeout: 800
- tapOn:
    point: "30%,78%"
- waitForAnimationToEnd:
    timeout: 800
- tapOn:
    point: "45%,78%"
- waitForAnimationToEnd:
    timeout: 800
- tapOn:
    point: "60%,78%"
- waitForAnimationToEnd:
    timeout: 800
- tapOn:
    point: "75%,78%"
- waitForAnimationToEnd:
    timeout: 800
- tapOn:
    point: "88%,78%"
- waitForAnimationToEnd:
    timeout: 800
- assertVisible: "Drag & Drop to Reorder"
- assertVisible: "Layout"
- assertVisible: "Next"
