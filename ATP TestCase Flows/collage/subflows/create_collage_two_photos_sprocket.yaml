appId: com.hp.impulse.sprocket
---
# Select 2 photos → Next → reorder with Layout visible.
- runFlow: select_two_photos_fast.yaml
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Drag & Drop to Reorder"
    timeout: 8000
- assertVisible: "Drag & Drop to Reorder"
- assertVisible: "Layout"
- assertVisible: "Next"
