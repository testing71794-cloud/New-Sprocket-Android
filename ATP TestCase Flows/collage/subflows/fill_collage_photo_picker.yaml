appId: com.kodak.steptouch
---
# Device-verified: start at image2, map strip indices 0→2 into frames.
- extendedWaitUntil:
    visible: "Select Photos"
    timeout: 2000
    optional: true
- runFlow:
    when:
      visible:
        id: "image2"
    commands:
      - tapOn:
          id: "image2"
      - tapOn:
          id: "image"
          index: 0
- runFlow:
    when:
      visible:
        id: "image3"
    commands:
      - tapOn:
          id: "image3"
      - tapOn:
          id: "image"
          index: 1
- runFlow:
    when:
      visible:
        id: "image4"
    commands:
      - tapOn:
          id: "image4"
      - tapOn:
          id: "image"
          index: 2
- waitForAnimationToEnd:
    timeout: 2000
