appId: com.hp.impulse.sprocket
---
# Collage_01 path: Sign Up Later → Create home (Collage Maker visible).
- tapOn: "Sign Up Later"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: ../../common/subflows/accept_terms_if_visible.yaml
- runFlow: ../../common/subflows/reach_kodak_coachmark_onboarding.yaml
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- runFlow: ../../permission/subflows/allow_all_runtime_permissions.yaml
- runFlow: ../../gallery/subflows/dismiss_gallery_coachmark_if_visible.yaml
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: ".*Create.*"
    commands:
      - tapOn: ".*Create.*"
- extendedWaitUntil:
    visible: ".*Collage Maker.*"
    timeout: 15000
- assertVisible: ".*Collage Maker.*"
- assertVisible: ".*Combine multiple photos.*"
