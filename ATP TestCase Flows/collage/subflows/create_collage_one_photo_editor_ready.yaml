appId: com.kodak.steptouch
---
- runFlow: enter_gallery_select_mode.yaml
- runFlow: select_one_photo.yaml
- runFlow: tap_collage_from_selection_bar.yaml
- runFlow: pick_collage_layout_one_slot.yaml
- runFlow:
    when:
      visible:
        id: "image1"
    commands:
      - tapOn:
          id: "image1"
      - tapOn:
          id: "relativeLayoutItem"
          index: 0
- extendedWaitUntil:
    visible:
      id: "btn_next_photobooth"
    timeout: 2000
- tapOn:
    id: "btn_next_photobooth"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(Edit Collage|Done).*"
    timeout: 2000
