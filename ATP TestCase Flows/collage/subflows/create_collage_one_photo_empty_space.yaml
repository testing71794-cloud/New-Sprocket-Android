appId: com.kodak.steptouch
---
# Sheet: 1 photo, layout, Next, switch layout, Next → toast fill all frames.
- runFlow: enter_gallery_select_mode.yaml
- runFlow: select_one_photo.yaml
- runFlow: tap_collage_from_selection_bar.yaml
- runFlow: pick_collage_layout_two_slot.yaml
- runFlow: fill_collage_one_slot.yaml
- extendedWaitUntil:
    visible:
      id: "btn_next_photobooth"
    timeout: 2000
- tapOn:
    id: "btn_next_photobooth"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: pick_collage_layout_2x2.yaml
- extendedWaitUntil:
    visible:
      id: "btn_next_photobooth"
    timeout: 2000
- tapOn:
    id: "btn_next_photobooth"
- extendedWaitUntil:
    visible: "Please fill all frame images"
    timeout: 2000
