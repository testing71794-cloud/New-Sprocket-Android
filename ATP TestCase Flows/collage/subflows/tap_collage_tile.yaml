appId: com.kodak.steptouch
---
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Edit Collage"
    commands:
      - tapOn:
          id: "image1"
      - extendedWaitUntil:
          visible:
            text: ".*(Border|Mirror|Flip|Replace|Rotate).*"
          timeout: 2000
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn:
          point: "25%, 35%"
          label: Collage preview slot
      - extendedWaitUntil:
          visible:
            text: ".*(Border|Mirror|Flip|Replace|Rotate).*"
          timeout: 2000
