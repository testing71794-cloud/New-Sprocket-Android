appId: com.kodak.steptouch
---
# Sheet: Done (button_save) saves collage and returns to gallery.
- runFlow: dismiss_print_overlay_if_visible.yaml
- extendedWaitUntil:
    visible:
      text: ".*(Edit Collage|Done).*"
    timeout: 2000
- tapOn:
    id: "button_save"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 2000
    optional: true
