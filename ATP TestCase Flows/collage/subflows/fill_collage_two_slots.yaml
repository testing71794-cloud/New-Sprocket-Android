appId: com.kodak.steptouch
---
# Assign both photos from the Select Photos strip into frame slots.
- extendedWaitUntil:
    visible: "Select Photos"
    timeout: 2000
- tapOn:
    id: "image1"
- tapOn:
    id: "relativeLayoutItem"
    below: "Select Photos"
    index: 0
- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    id: "image2"
- tapOn:
    id: "relativeLayoutItem"
    below: "Select Photos"
    index: 1
- waitForAnimationToEnd:
  timeout: 2000
