appId: com.kodak.steptouch
---
- runFlow:
    when:
      visible:
        text: ".*(Edit Collage|Done).*"
    commands:
      - tapOn:
          id: "linearLayoutBack"
          optional: true
      - pressKey: back
- runFlow:
    when:
      visible: "CREATE COLLAGE"
    commands:
      - tapOn:
          id: "linearLayoutBack"
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "MY GALLERY"
    timeout: 2000
