appId: com.kodak.steptouch
---
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 2000
- tapOn:
    id: "ivItemGridImage"
    index: 0
- doubleTapOn:
    id: "relativeLayoutItem"
    optional: true
- tapOn:
    point: "50%, 45%"
    label: Gallery photo fallback
    optional: true
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "Collage"
    timeout: 2000
    optional: true
