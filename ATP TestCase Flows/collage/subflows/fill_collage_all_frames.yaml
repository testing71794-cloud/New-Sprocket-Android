appId: com.kodak.steptouch
---
# Fill every visible collage frame from the Select Photos strip.
- extendedWaitUntil:
    visible: "Select Photos"
    timeout: 2000
- tapOn:
    id: "image1"
- tapOn:
    id: "image"
    index: 0
- runFlow:
    when:
      visible:
        id: "image2"
    commands:
      - tapOn:
          id: "image2"
      - tapOn:
          id: "image"
          index: 1
- runFlow:
    when:
      visible:
        id: "image3"
    commands:
      - tapOn:
          id: "image3"
      - tapOn:
          id: "image"
          index: 2
- runFlow:
    when:
      visible:
        id: "image4"
    commands:
      - tapOn:
          id: "image4"
      - tapOn:
          id: "image"
          index: 3
- waitForAnimationToEnd:
  timeout: 2000
