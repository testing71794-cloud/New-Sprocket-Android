appId: com.hp.impulse.sprocket
---
# Create home without Photos permission (for Collage_02 permission popup).
- tapOn: "Sign Up Later"
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: ../../common/subflows/accept_terms_if_visible.yaml
- runFlow: ../../common/subflows/reach_kodak_coachmark_onboarding.yaml
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- runFlow: ../../permission/subflows/allow_camera_permission.yaml
- runFlow: ../../permission/subflows/allow_location_precise_permission.yaml
- runFlow: ../../permission/subflows/allow_nearby_devices_permission.yaml
- runFlow: ../../permission/subflows/allow_notification_permission.yaml
# Intentionally skip Photos & Videos so Collage Maker can show the system popup.
- runFlow: ../../gallery/subflows/dismiss_gallery_coachmark_if_visible.yaml
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: ".*Create.*"
    commands:
      - tapOn: ".*Create.*"
- extendedWaitUntil:
    visible: ".*Collage Maker.*"
    timeout: 15000
- assertVisible: ".*Collage Maker.*"
