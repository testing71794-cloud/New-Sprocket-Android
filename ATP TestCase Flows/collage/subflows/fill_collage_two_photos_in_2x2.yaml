appId: com.kodak.steptouch
---
# Map two gallery-selected photos into all four 2x2 frames.
- extendedWaitUntil:
    visible: "Select Photos"
    timeout: 2000
- tapOn:
    id: "image1"
- tapOn:
    id: "relativeLayoutItem"
    below: "Select Photos"
    index: 0
- tapOn:
    id: "image2"
- tapOn:
    id: "relativeLayoutItem"
    below: "Select Photos"
    index: 1
- tapOn:
    id: "image3"
- tapOn:
    id: "relativeLayoutItem"
    below: "Select Photos"
    index: 0
- tapOn:
    id: "image4"
- tapOn:
    id: "relativeLayoutItem"
    below: "Select Photos"
    index: 1
- waitForAnimationToEnd:
  timeout: 2000
