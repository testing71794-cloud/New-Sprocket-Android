# TC_ID: SU_01 - I'll do it later
appId: com.kodak.steptouch
name: SU_01 - I'll do it later
---
# ATP SU_01 – Skip sign up, then agree to terms (expects onboarding afterward).
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "I'll do it later"
- tapOn: "I'll do it later"
- runFlow: subflows/accept_terms_if_visible.yaml
- runFlow: handle_optional_permissions_loop.yaml
- runFlow:
    when:
      visible: "Start a quick tour"
    commands:
      - tapOn: "Start a quick tour"
      - waitForAnimationToEnd:
        timeout: 2000
# ON_01 alignment: first carousel slide (copy may wrap across lines).
- runFlow:
    when:
      visible: "Switch Between\nCamera and Gallery"
    commands:
      - assertVisible: "Switch Between\nCamera and Gallery"
- runFlow:
    when:
      visible: "Gallery"
    commands:
      - assertVisible: "Gallery"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
        timeout: 2000
