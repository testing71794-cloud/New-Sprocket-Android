# TC_ID: SU_03B - Create account - invalid email (no domain)
appId: com.kodak.steptouch
name: SU_03B - Create account - invalid email (no domain)
---
# ATP SU_03B – Invalid email (no domain).
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Email*"
- inputText: user@
- tapOn: "Password*"
- inputText: TestPass1a
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "Please provide your valid email"
    timeout: 2000
