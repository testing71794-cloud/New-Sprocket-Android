# TC_ID: SU_04C - Create account - password no lowercase
appId: com.kodak.steptouch
name: SU_04C - Create account - password no lowercase
---
# ATP SU_04C – Password missing lowercase.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Email*"
- inputText: maestro.nolower@yopmail.com
- tapOn: "Password*"
- inputText: TESTPASS1A
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(?i)(lowercase|lower case).*"
    timeout: 2000
