# TC_ID: SU_10 - Log in Forgot Password
appId: com.kodak.steptouch
name: SU_10 - Log in Forgot Password
---
# ATP SU_10 – Forgot password from Log In; submit reset for valid email.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Already have an account?"
- tapOn: "Log In"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "Forgot password?"
    timeout: 2000
- tapOn: "Forgot password?"
- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    text: "Email*"
    optional: true
- tapOn:
    text: "Email"
    optional: true
- inputText: Niteshmehra56@yopmail.com
- hideKeyboard
- waitForAnimationToEnd:
  timeout: 2000
- runFlow:
    when:
      visible: "Send"
    commands:
      - tapOn: "Send"
      - waitForAnimationToEnd:
        timeout: 2000
- runFlow:
    when:
      visible: "DONE"
    commands:
      - tapOn: "DONE"
      - waitForAnimationToEnd:
        timeout: 2000
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
      - waitForAnimationToEnd:
        timeout: 2000
# Adjust substring if your build uses different success copy (e.g. "check your inbox").
- assertVisible:
    text: "Password"
    optional: true
- assertVisible:
    text: "Log In"
    optional: true
- assertVisible:
    text: "LOGIN"
    optional: true
