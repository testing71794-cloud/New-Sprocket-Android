# TC_ID: SU_E03 - Create account - terms unchecked
appId: com.kodak.steptouch
name: SU_E03 - Create account - terms unchecked
---
# ATP SU_E03 – Terms unchecked (signup blocked or terms required).
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- runScript: scripts/gen_unique_email.js
- tapOn: "Email*"
- inputText: ${output.signupEmail}
- tapOn: "Password*"
- inputText: TestPass1a
- hideKeyboard
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
  timeout: 2000
- runFlow: handle_optional_permissions_loop.yaml
- extendedWaitUntil:
    visible:
      text: ".*(?i)(terms|agree).*"
    timeout: 2000
