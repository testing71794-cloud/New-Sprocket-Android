# TC_ID: SU_E02 - Create account - empty email
appId: com.kodak.steptouch
name: SU_E02 - Create account - empty email
---
# ATP SU_E02 – Empty email validation.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Password*"
- inputText: TestPass1a
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(?i)(email|valid email).*"
    timeout: 2000
