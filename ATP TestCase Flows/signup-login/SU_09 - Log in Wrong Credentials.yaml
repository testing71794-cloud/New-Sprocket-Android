# TC_ID: SU_09 - Log in Wrong Credentials
appId: com.kodak.steptouch
name: SU_09 - Log in Wrong Credentials
---
# ATP SU_09 – Wrong email or password shows Wrong credentials alert.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Already have an account?"
- tapOn: "Log In"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "LOGIN"
    timeout: 2000
- tapOn:
    text: "Email*"
    optional: true
- tapOn:
    text: "Email"
    optional: true
- inputText: definitely.not.a.real.user@example.com
- tapOn:
    text: "Password*"
    optional: true
- tapOn:
    text: "Password"
    optional: true
- inputText: WrongPass999!
- hideKeyboard
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "LOGIN"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(?i)(wrong credential|invalid email|invalid password).*"
    timeout: 2000
- assertVisible:
    text: "You have entered an invalid email id or password"
    optional: true
- tapOn:
    text: "Ok"
    optional: true
- tapOn:
    text: "OK"
    optional: true
