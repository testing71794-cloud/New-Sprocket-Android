# TC_ID: SU_08 - Log in Window
appId: com.kodak.steptouch
name: SU_08 - Log in Window
---
# ATP SU_08 – Navigate to Log In, valid credentials, then Terms & Conditions.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Already have an account?"
- assertVisible: "Log In"
- tapOn: "Log In"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "LOGIN"
    timeout: 2000
- assertVisible:
    text: "Log In"
    optional: true
- assertVisible: "Email"
- assertVisible: "Password"
- assertVisible: "Forgot password?"
- assertVisible: "LOGIN"
- assertVisible: "Don't have an account?"
- tapOn:
    text: "Email*"
    optional: true
- tapOn:
    text: "Email"
    optional: true
- inputText: Niteshmehra56@gmail.com
- tapOn:
    text: "Password*"
    optional: true
- tapOn:
    text: "Password"
    optional: true
- inputText: 252546Nm#
- hideKeyboard
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "LOGIN"
- waitForAnimationToEnd:
  timeout: 2000
- runFlow: handle_optional_permissions_loop.yaml
- runFlow: subflows/accept_terms_if_visible.yaml
- assertVisible:
    text: "Agree Terms and Conditions"
    optional: true
