# TC_ID: SU_03C - Create account - invalid email (spaces)
appId: com.kodak.steptouch
name: SU_03C - Create account - invalid email (spaces)
---
# ATP SU_03C – Invalid email (spaces).
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Email*"
- inputText: "bad email @test.com"
- tapOn: "Password*"
- inputText: TestPass1a
- hideKeyboard
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "Please provide your valid email"
    timeout: 2000
