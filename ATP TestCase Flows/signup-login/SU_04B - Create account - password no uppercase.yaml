# TC_ID: SU_04B - Create account - password no uppercase
appId: com.kodak.steptouch
name: SU_04B - Create account - password no uppercase
---
# ATP SU_04B – Password missing uppercase.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Email*"
- inputText: maestro.noupper@yopmail.com
- tapOn: "Password*"
- inputText: testpass1a
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      text: ".*(?i)(uppercase|upper case).*"
    timeout: 2000
