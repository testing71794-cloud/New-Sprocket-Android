appId: com.kodak.steptouch
---
# ATP ON_03 / Connection prequel: skip onboarding, accept runtime permissions, land on gallery.
- runFlow: onboarding_entry_from_cold_start.yaml
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"

- extendedWaitUntil:
    visible: "My gallery"
    timeout: 2000
