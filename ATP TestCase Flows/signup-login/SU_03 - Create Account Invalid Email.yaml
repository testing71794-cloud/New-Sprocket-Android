# TC_ID: SU_03 - Create Account Invalid Email
appId: com.kodak.steptouch
name: SU_03 - Create Account Invalid Email
---
# ATP SU_03 – Invalid email shows validation under email field.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "I'll do it later"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Email*"
- inputText: notanemail
- tapOn: "Password*"
- inputText: TestPass1a
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible: "Please provide your valid email"
    timeout: 2000
