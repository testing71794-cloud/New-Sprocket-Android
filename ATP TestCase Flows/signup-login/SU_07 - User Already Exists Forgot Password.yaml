# TC_ID: SU_07 - User Already Exists Forgot Password
appId: com.kodak.steptouch
name: SU_07 - User Already Exists Forgot Password
---
# ATP SU_07 – From duplicate-user alert, open Forgot password.
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "I'll do it later"
- tapOn: "Full Name*"
- inputText: Nitesh Mehra
- tapOn: "Email*"
- inputText: Niteshmehra56@gmail.com
- tapOn: "Password*"
- inputText: 252546Nm#
- hideKeyboard
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "SIGN UP"
- extendedWaitUntil:
    visible: "User already exists"
    timeout: 2000
- tapOn:
    text: "Forgot password?"
    optional: true
- tapOn:
    text: "Forgot Password"
    optional: true
- tapOn:
    text: "Forgot"
    optional: true
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "Forgot password?"
    timeout: 2000
- assertVisible:
    text: "Email*"
    optional: true
- assertVisible:
    text: "Email"
    optional: true
- assertVisible:
    text: "Send"
    optional: true
