# TC_ID: PR_01 - Single Print
# PR_01 – Single Print (recorded flow: video 1780485381338)
# gallery → photo → print FAB → [connect: device 21%,13% + pair] → print preview → print → progress
# Env: BT_DEVICE_NAME
appId: com.kodak.steptouch
name: PR_01 - Single Print
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: ../connection/subflows/reach_gallery_after_onboarding_skip_for_connection.yaml
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- runFlow:
    when:
      notVisible: ".*(?i)my gallery.*"
    commands:
      - pressKey: back
      - pressKey: back
      - tapOn:
          id: back_button
          optional: true
      - tapOn:
          id: linearLayoutBack
          optional: true
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 2000
- tapOn:
    point: "50%, 45%"
    label: Gallery thumbnail
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
- tapOn:
    text: "Ok"
    optional: true
- tapOn:
    text: "OK"
    optional: true
# Print bottom-right FAB (video).
- tapOn:
    point: "88%, 92%"
    label: Print bottom-right
# Connect from print window when printer not paired (video / CO_03).
- tapOn: "Print"
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    point: 21%,13%
- waitForAnimationToEnd:
    timeout: 2000
- runFlow: subflows/pairing_optional.yaml
- waitForAnimationToEnd:
    timeout: 2000
- waitForAnimationToEnd:
    timeout: 2000
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
            - waitForAnimationToEnd:
                timeout: 2000
- assertVisible:
    id: "ivItemGridImage"
    index: 6
- runFlow:
    when:
      visible: "Print Successful"
    commands:
      - assertVisible: "Print Successful"
