# TC_ID: PR_04 - Camera Capture Print
# PR_04 – Camera Capture Print (camera capture + same connect/print path as PR_01)
# Env: BT_DEVICE_NAME
appId: com.kodak.steptouch
name: PR_04 - Camera Capture Print
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: ../connection/subflows/reach_gallery_after_onboarding_skip_for_connection.yaml
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- runFlow:
    when:
      notVisible: ".*(?i)my gallery.*"
    commands:
      - pressKey: back
      - pressKey: back
      - tapOn:
          id: back_button
          optional: true
      - tapOn:
          id: linearLayoutBack
          optional: true
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 2000
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd:
  timeout: 2000
- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    point: 21%,13%

- runFlow: subflows/pairing_optional.yaml
- runFlow:
    when:
      visible:
        id: "imageViewCancel"
    commands:
      - tapOn:
          id: "imageViewCancel"
- runFlow:
    when:
      visible:
        id: camerIV
    commands:
      - tapOn:
          id: camerIV

- runFlow:
    when:
      notVisible:
        id: capture_img
    commands:
      - swipe:
          start: "12%, 55%"
          end: "82%, 55%"
- runFlow:
    when:
      notVisible:
        id: capture_img
    commands:
      - tapOn:
          point: "88%, 92%"
          label: Camera FAB fallback
- runFlow:
    when:
      visible: "Swipe left to apply live filters"
    commands:
      - tapOn:
          text: "Ok"
          optional: true
      - tapOn:
          text: "OK"
          optional: true
- tapOn:
    id: capture_img
- runFlow:
    when:
      notVisible:
        id: camera_image
    commands:
      - tapOn:
          id: img_camera_menu
          optional: true
      - tapOn:
          id: camera_image
          optional: true
- assertVisible:
    id: camera_image
- assertVisible: "Print"
- tapOn: "Print"
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "Print"

- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    point: 21%,13%
- waitForAnimationToEnd:
  timeout: 2000
- runFlow: subflows/pairing_optional.yaml
- waitForAnimationToEnd:
  timeout: 2000
- waitForAnimationToEnd:
  timeout: 2000
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
            - waitForAnimationToEnd:
              timeout: 2000
- assertVisible:
    id: "ivItemGridImage"
    index: 6
    optional: true
- runFlow:
    when:
      visible: "Print Successful"
    commands:
      - assertVisible: "Print Successful"
