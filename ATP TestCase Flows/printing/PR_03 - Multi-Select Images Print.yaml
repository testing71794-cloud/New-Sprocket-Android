# TC_ID: PR_03 - Multi-Select Images Print
# PR_03 – Multi-Select Images Print (3 photos + same connect/print path as PR_01)
# Env: BT_DEVICE_NAME
appId: com.kodak.steptouch
name: PR_03 - Multi-Select Images Print
---
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Create an account"
    commands:
      - runFlow: ../connection/subflows/reach_gallery_after_onboarding_skip_for_connection.yaml
- runFlow:
    when:
      visible: "No Thanks"
    commands:
      - tapOn: "No Thanks"
- runFlow:
    when:
      notVisible: ".*(?i)my gallery.*"
    commands:
      - pressKey: back
      - pressKey: back
      - tapOn:
          id: back_button
          optional: true
      - tapOn:
          id: linearLayoutBack
          optional: true
- extendedWaitUntil:
    visible: ".*(?i)my gallery.*"
    timeout: 2000
- tapOn:
    id: "imageViewConnection"
- waitForAnimationToEnd:
  timeout: 2000
- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    point: 21%,13%

- runFlow: subflows/pairing_optional.yaml
- waitForAnimationToEnd:
  timeout: 2000
- extendedWaitUntil:
    visible: "Select"
    timeout: 2000
- tapOn: "Select"
- extendedWaitUntil:
    visible:
      id: "ivItemGridImage"
    timeout: 2000
- tapOn:
    id: "ivItemGridImage"
- tapOn:
    id: "ivItemGridImage"
    index: 1
- tapOn:
    id: "ivItemGridImage"
    index: 2
- tapOn:
    id: "textViewPrint"
    optional: true
- tapOn: "Print"
- waitForAnimationToEnd:
  timeout: 2000
- tapOn:
    point: 21%,13%
- waitForAnimationToEnd:
  timeout: 2000
- runFlow: subflows/pairing_optional.yaml
- waitForAnimationToEnd:
  timeout: 2000
- waitForAnimationToEnd:
  timeout: 2000
- repeat:
    times: 6
    commands:
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
            - waitForAnimationToEnd:
              timeout: 2000
- assertVisible:
    id: "ivItemGridImage"
    index: 6
    optional: true
- runFlow:
    when:
      visible: "Print Successful"
    commands:
      - assertVisible: "Print Successful"
