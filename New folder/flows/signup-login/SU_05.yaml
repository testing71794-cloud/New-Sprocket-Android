appId: com.hp.impulse.sprocket
name: SU_05_Create_Account_Invalid_Password
---
# ATP SU_05 – Weak password shows requirements message (needs upper case, etc.).
- launchApp:
    clearState: true
- runFlow: subflows/post_launch_through_signup.yaml
- assertVisible: "Create an account"
- assertVisible: "Full Name*"
- assertVisible: "Email*"
- assertVisible: "Password*"
- assertVisible: "SIGN UP"
- assertVisible: "Already have an account?"
- assertVisible: "I'll do it later"
- tapOn: "Full Name*"
- inputText: Maestro ATP User
- tapOn: "Email*"
- inputText: maestro.pwd.invalid@yopmail.com
- tapOn: "Password*"
- inputText: ab
- hideKeyboard
- waitForAnimationToEnd:
  timeout: 2000
- tapOn: "SIGN UP"
- waitForAnimationToEnd:
  timeout: 2000
- assertVisible: "Password must include: At least 1 uppercase letter, At least 8 characters"

