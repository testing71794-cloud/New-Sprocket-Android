appId: com.kodak.steptouch
name: Settings Screen - Testcases
---
- waitForAnimationToEnd

# =========================================================
# PRECONDITION: Open Settings screen (tap top-left gear)
# =========================================================
- tapOn:
    point: "8%, 10%"
    label: Settings (gear) – top-left
    optional: true
- tapOn:
    id: settingImageView
    optional: true
- waitForAnimationToEnd

# =========================================================
# TC-00: Assert Settings screen UI (Step Print copy varies by build)
# =========================================================
- runFlow:
    when:
      visible: "Quick tips"
    commands:
      - assertVisible: "Quick tips"

- runFlow:
    when:
      visible: "Quick Tips"
    commands:
      - assertVisible: "Quick Tips"

- runFlow:
    when:
      visible: "Support"
    commands:
      - assertVisible: "Support"

- runFlow:
    when:
      visible: "Legal"
    commands:
      - assertVisible: "Legal"

- runFlow:
    when:
      visible: "About Us"
    commands:
      - assertVisible: "About Us"

# =========================================================
# TC-01: Quick tips -> App quick tour (SE_03 alignment)
# =========================================================
- runFlow:
    when:
      visible: "Quick tips"
    commands:
      - tapOn: "Quick tips"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "App quick tour"
          commands:
            - tapOn: "App quick tour"
            - waitForAnimationToEnd
      - back
      - waitForAnimationToEnd

# =========================================================
# TC-02: Quick Tips (legacy label) -> back
# =========================================================
- runFlow:
    when:
      visible: "Quick Tips"
    commands:
      - tapOn: "Quick Tips"
      - waitForAnimationToEnd
      - back
      - waitForAnimationToEnd

# =========================================================
# TC-03: Legal -> assert screen -> back
# =========================================================
- runFlow:
    when:
      visible: "Legal"
    commands:
      - tapOn: "Legal"
      - waitForAnimationToEnd
      - assertVisible: "Legal"
      - scroll
      - scroll
      - back
      - waitForAnimationToEnd

# =========================================================
# TC-04: About Us -> assert screen -> back
# =========================================================
- runFlow:
    when:
      visible: "About Us"
    commands:
      - tapOn: "About Us"
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "About Us"
          commands:
            - assertVisible: "About Us"
      - back
      - waitForAnimationToEnd

# =========================================================
# TC-05: Support -> open -> back
# =========================================================
- runFlow:
    when:
      visible: "Support"
    commands:
      - tapOn: "Support"
      - waitForAnimationToEnd
      - back
      - waitForAnimationToEnd

# =========================================================
# TC-06: Back from Settings to previous screen
# =========================================================
- back
- waitForAnimationToEnd
