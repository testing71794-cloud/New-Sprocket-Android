appId: com.kodak.steptouch
name: Swipe onboarding intro if shown
---
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd:
        timeout: 2000
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd:
        timeout: 2000
