appId: com.kodak.steptouch
name: Open Pre-Cut editor (shared)
---
# Navigate to Pre-Cuts tab and dismiss intro popup when shown.
- runFlow:
    when:
      visible: "Pre-Cuts"
    commands:
      - tapOn: "Pre-Cuts"
      - waitForAnimationToEnd:
          timeout: 2000
      - tapOn:
          point: "20%,60%"
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: "Pre-Cut Stickers"
    commands:
      - runFlow:
          when:
            visible: "Kodak 2x3 Pre-Cut Sticker Paper"
          commands:
            - tapOn: "Kodak 2x3 Pre-Cut Sticker Paper"
            - waitForAnimationToEnd:
                timeout: 2000
            - back
            - waitForAnimationToEnd:
                timeout: 2000
      - tapOn: "OK"
      - waitForAnimationToEnd:
          timeout: 2000

- extendedWaitUntil:
    visible: "CREATE PRE-CUT"
    timeout: 2000
