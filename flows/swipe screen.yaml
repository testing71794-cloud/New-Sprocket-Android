appId: com.kodak.steptouch
---
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd:
        timeout: 2000
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd:
        timeout: 2000
# Legacy Smile printer intro (optional on Step Print)
- runFlow:
    when:
      visible: "Find My Printer"
    commands:
      - assertVisible: "Find My Printer"
      - waitForAnimationToEnd:
        timeout: 2000
      - swipe:
          start: "80%,55%"
          end: "20%,55%"
      - waitForAnimationToEnd:
        timeout: 2000

# Step Print onboarding carousel
- runFlow:
    when:
      visible: "Gallery"
    commands:
      - swipe:
          direction: LEFT
      - waitForAnimationToEnd:
        timeout: 2000
# If "Device found" screen appears → assert + swipe right to left
- runFlow:
    when:
      visible: "Device found"
    commands:
      - assertVisible: "Device found"
      - waitForAnimationToEnd:
        timeout: 2000

      - swipe:
          start: "80%,55%"
          end: "20%,55%"

      - waitForAnimationToEnd:
        timeout: 2000
