appId: com.kodak.steptouch
name: Skip signup – I'll do it later
---
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Create an account"
    commands:
      - assertVisible: "I'll do it later"
      - tapOn: "I'll do it later"
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Sign Up"
    commands:
      - assertVisible: "I'll do it later"
      - tapOn: "I'll do it later"
      - waitForAnimationToEnd
