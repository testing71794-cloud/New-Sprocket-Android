appId: com.hp.impulse.sprocket
---

# Open Camera from Gallery (My Gallery screen).
# Method 1: tap bottom-right camera FAB. Method 2: swipe left-to-right across gallery.
- runFlow:
    when:
      visible:
        text: ".*(?i)my gallery.*"
    commands:
      - assertVisible:
          text: ".*(?i)my gallery.*"
- runFlow:
    when:
      visible:
        id: camerIV
    commands:
      - tapOn:
          id: camerIV
      - waitForAnimationToEnd:
          timeout: 2000
# Swipe left-to-right on gallery content (finger L→R = Maestro swipe RIGHT).
- runFlow:
    when:
      notVisible:
        id: shutterButton
    commands:
      - swipe:
          start: "12%, 55%"
          end: "82%, 55%"
      - waitForAnimationToEnd:
          timeout: 2000

# Coachmark in video: "Swipe left to apply live filters" with button "Ok"
- runFlow:
    when:
      visible: "Swipe left to apply live filters"
    commands:
      - runFlow:
          when:
            visible: "Ok"
          commands:
            - tapOn: "Ok"
            - waitForAnimationToEnd:
                timeout: 2000
      - runFlow:
          when:
            visible: "OK"
          commands:
            - tapOn: "OK"
            - waitForAnimationToEnd:
                timeout: 2000

# Camera screen anchor (video shows "Close" text at top)
- runFlow:
    when:
      visible: "Close"
    commands:
      - assertVisible: "Close"

# Open Gallery preview icon (bottom-left small thumbnail)
- assertVisible:
    id: imageViewPreview
- tapOn:
    id: imageViewPreview
- waitForAnimationToEnd:
    timeout: 2000
# If the fine-tune coachmark popup is visible, dismiss it
- runFlow:
    when:
      visible: "Ok"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd:
          timeout: 2000

# Tap the X close button from fine-tune screen
- runFlow:
    when:
      visible: "X"
    commands:
      - tapOn: "X"
      - waitForAnimationToEnd:
          timeout: 2000
# Ensure we are on camera screen
- assertVisible: "Close"
# Close preview if open, return to camera
- tapOn: "Close"
- waitForAnimationToEnd:
    timeout: 2000
# Tap flash button (top right)
- tapOn:
    id: imageViewFlash
- waitForAnimationToEnd:
    timeout: 2000

# Tap capture button (big yellow circle)
- runFlow:
    when:
      visible:
        id: shutterButton
    commands:
      - tapOn:
          id: shutterButton
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      notVisible:
        id: shutterButton
    commands:
      - tapOn:
          point: "50%,90%"
      - waitForAnimationToEnd:
          timeout: 2000
- tapOn:
    id: imageViewPreview
# Wait for a few seconds to simulate user review time
- waitForAnimationToEnd:
    timeout: 2000
- waitForAnimationToEnd:
    timeout: 2000

# Now close the preview screen
- tapOn: "Close"
- waitForAnimationToEnd:
    timeout: 2000

# ===============================
# Camera: Switch -> Flash -> Capture -> Preview
# ===============================

# Make sure we are on Camera screen
- assertVisible: "Close"

# 1) Tap camera switch icon (near top-right, beside flash)
# Using point is most reliable across builds.
- tapOn:
    id: imageViewFlipCamera
- waitForAnimationToEnd:
    timeout: 2000

# 2) Tap flash icon (top-right)
# Prefer id if available; otherwise use point.
- runFlow:
    when:
      visible:
        id: imageViewFlash
    commands:
      - tapOn:
          id: imageViewFlash
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      notVisible:
        id: imageViewFlash
    commands:
      - tapOn:
          point: "94%,7%"
      - waitForAnimationToEnd:
          timeout: 2000

# 3) Tap capture (yellow circle)
# Prefer id if available; otherwise use point.
- runFlow:
    when:
      visible:
        id: shutterButton
    commands:
      - tapOn:
          id: shutterButton
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      notVisible:
        id: shutterButton
    commands:
      - tapOn:
          point: "50%,90%"
      - waitForAnimationToEnd:
          timeout: 2000
# Open Gallery preview icon (bottom-left small thumbnail)
- assertVisible:
    id: imageViewPreview
- tapOn:
    id: imageViewPreview
- waitForAnimationToEnd:
    timeout: 2000
