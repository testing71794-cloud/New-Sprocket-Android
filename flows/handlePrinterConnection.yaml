appId: com.hp.impulse.sprocket
---
# Handle printer connection screens:
# Searching -> Couldn't find -> Search Again -> Device found list -> Connect -> Pair

# If searching appears, wait until search UI settles (one targeted wait vs four animation polls)
- runFlow:
    when:
      visible: "Searching for your device..."
    commands:
      - extendedWaitUntil:
          notVisible: "Searching for your device..."
          timeout: 2000
      - waitForAnimationToEnd:
          timeout: 2000

# If couldn't find appears, tap Search Again
- runFlow:
    when:
      visible: "We couldn't find"
    commands:
      - assertVisible: "Search Again"
      - tapOn: "Search Again"
      - waitForAnimationToEnd:
          timeout: 2000

# When device list appears, tap Connect
- runFlow:
    when:
      visible: "Device found"
    commands:
      - assertVisible: "Connect"
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000
      - runFlow: ../flows/handleBluetoothPairing.yaml

- runFlow:
    when:
      visible: "Let's hook it up!"
    commands:
      - assertVisible: "Connect"
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000
      - runFlow: ../flows/handleBluetoothPairing.yaml

# Fallback: if Connect is visible anywhere, tap it + handle pairing
- runFlow:
    when:
      visible: "Connect"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000
      - runFlow: ../flows/handleBluetoothPairing.yaml
