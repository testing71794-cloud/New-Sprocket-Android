appId: com.kodak.steptouch
---

# Cooldown
- runFlow:
    when:
      visible: "Camera is cooling down"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd

# Out of paper
- runFlow:
    when:
      visible: "You are out of paper"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd

# Print Successful
- runFlow:
    when:
      visible: "Print Successful"
    commands:
      - takeScreenshot: "print_success"
      - tapOn:
          point: 2%,5%
      - waitForAnimationToEnd
