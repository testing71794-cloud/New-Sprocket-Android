appId: com.kodak.steptouch
name: Agree Terms and Conditions
---
- waitForAnimationToEnd

- runFlow:
    when:
      visible: "Terms and Conditions"
    commands:
      - assertVisible: "Terms and Conditions"
      - runFlow:
          when:
            visible: "TERMS OF USE"
          commands:
            - assertVisible: "TERMS OF USE"
      - tapOn: "Agree Terms and Conditions"
      - waitForAnimationToEnd
