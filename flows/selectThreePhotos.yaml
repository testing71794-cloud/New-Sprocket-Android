appId: com.kodak.steptouch
---
- runFlow:
    when:
      visible: "All Photos"
    commands:
      # 1) Assert gallery screen
      - assertVisible: "All Photos"

      # 2) Tap Select
      - tapOn:
          id: textViewSelect
      - waitForAnimationToEnd:
        timeout: 2000

      # 3) Select thumbnail index 2
      - tapOn:
         id: imageViewPhoto
         index: 1
      - waitForAnimationToEnd:
        timeout: 2000

      # 4) Select thumbnail index 2
      - tapOn:
         id: imageViewPhoto
         index: 2
      - waitForAnimationToEnd:
        timeout: 2000

      # 5) Assert we are still on All Photos screen (screen attached)
      - assertVisible: "Select Items"

      # 6) Select thumbnail index 5
      - tapOn:
          id: imageViewPhoto
          index: 6
      - waitForAnimationToEnd:
        timeout: 2000

      # 7) Assert Print button visible then tap Print
      - assertVisible:
          id: textViewPrint
      - tapOn:
          id: textViewPrint
      - waitForAnimationToEnd:
        timeout: 2000
