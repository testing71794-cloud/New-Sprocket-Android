appId: com.kodak.steptouch
---
# Android runtime permission dialogs (best-effort)
- runFlow:
    when:
      visible: "Photos Access Required"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd:
        timeout: 2000

- runFlow:
    when:
      visible: "Enable photos access"
    commands:
      - tapOn: "Enable photos access"
      - waitForAnimationToEnd:
        timeout: 2000

- runFlow:
    when:
      visible:
        text: ".*(?i)(step touch|steptouch|kodak).*find.*"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd:
        timeout: 2000
