appId: com.kodak.steptouch
name: Onboarding Welcome Screen
---
- waitForAnimationToEnd:
    timeout: 2000

# Step Print: carousel onboarding (ON_* ATP). Legacy Smile "Find My Printer" kept optional.
- runFlow:
    when:
      visible: "Gallery"
    commands:
      - assertVisible: "Gallery"
      - runFlow:
          when:
            visible: "Next"
          commands:
            - tapOn: "Next"
            - waitForAnimationToEnd:
                timeout: 2000

- runFlow:
    when:
      visible: "Welcome"
    commands:
      - assertVisible: "Welcome"
      - runFlow:
          when:
            visible: "Find My Printer"
          commands:
            - tapOn: "Find My Printer"
            - waitForAnimationToEnd:
                timeout: 2000
      - runFlow:
          when:
            visible: "Find My Camera"
          commands:
            - assertVisible:
                text: "Find My Camera"
                optional: true

- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 2000
