appId: com.hp.impulse.sprocket
name: ED_12 - Add Text
---

- tapOn: "Text"
- waitForAnimationToEnd:
    timeout: 2000

# Focus text field (best-effort)
- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd:
    timeout: 2000

- inputText: "Hello World"
- waitForAnimationToEnd:
    timeout: 2000

# Close keyboard / confirm (varies by device)
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
      - waitForAnimationToEnd:
          timeout: 2000

# Move text on canvas (drag not supported; use swipe)
- swipe:
    start: "50%,55%"
    end: "70%,60%"
- waitForAnimationToEnd:
    timeout: 2000

# Save/apply
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: "Save"
    commands:
      - tapOn: "Save"
      - waitForAnimationToEnd:
          timeout: 2000
