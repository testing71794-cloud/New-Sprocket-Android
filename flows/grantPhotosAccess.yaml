appId: com.kodak.steptouch
name: Grant photos access (best-effort)
---
# Centralized photos permission dialogs (Collage / album ATP paths).
- runFlow:
    when:
      visible:
        text: ".*(?i)(step touch|steptouch|kodak).*access photos.*"
    commands:
      - tapOn: "Allow"
      - waitForAnimationToEnd:
        timeout: 2000

- runFlow:
    when:
      visible: "Photos Access Required"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd:
        timeout: 2000
