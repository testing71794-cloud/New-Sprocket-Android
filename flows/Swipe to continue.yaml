appId: com.kodak.steptouch
name: Connect printer from intro + print (complete)
---
# ------------------------------
# 1) Swipe to continue (if shown)
# ------------------------------
- runFlow:
    when:
      visible: "Swipe to continue"
    commands:
      - tapOn:
          point: "50%,50%"
      - waitForAnimationToEnd:
          timeout: 2000
      - swipe:
          start: "75%,55%"
          end: "15%,45%"
      - waitForAnimationToEnd:
          timeout: 2000

# Legacy Smile: Find My Printer (optional)
- runFlow:
    when:
      visible: "Find My Printer"
    commands:
      - tapOn: "Find My Printer"
      - waitForAnimationToEnd:
          timeout: 2000

# Step Print: skip carousel onboarding when shown
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 2000

# ------------------------------
# 8) Sometimes Connect shows again after pairing
# ------------------------------
- runFlow:
    when:
      visible: "Connect"
    commands:
      - waitForAnimationToEnd:
          timeout: 2000
      - assertVisible: "Connect"
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000
# Handle Android Bluetooth pairing request dialog

- runFlow:
    when:
      visible: "Pair"
    commands:
      - assertVisible: "Pair"
      - tapOn: "Pair"
      - waitForAnimationToEnd:
          timeout: 2000
