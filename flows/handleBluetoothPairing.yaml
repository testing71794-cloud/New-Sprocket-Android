appId: com.hp.impulse.sprocket
---
# Handle Android Bluetooth pairing request dialog

- runFlow:
    when:
      visible: "Bluetooth pairing request"
    commands:
      - assertVisible: "Pair"
      - tapOn: "Pair"
      - waitForAnimationToEnd:
          timeout: 2000

# Some devices show partial text like "Pair with Kodak Step Touch"
- runFlow:
    when:
      visible:
        text: ".*Pair with Kodak.*"
    commands:
      - tapOn: "Pair"
      - waitForAnimationToEnd:
          timeout: 2000
