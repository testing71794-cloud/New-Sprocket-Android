appId: com.kodak.steptouch
---
# Tap first photo in album grid (id: imageRelativelayout not found in app)
- tapOn:
    point: "20%,30%"
- runFlow:
    when:
      visible: "Ok"
    commands:
      - tapOn: "Ok"
      - waitForAnimationToEnd:
        timeout: 2000
- runFlow:
    when:
      visible: "Time to Fine-Tune"
    commands:
      - tapOn: "Ok"
- waitForAnimationToEnd:
  timeout: 2000
