appId: com.kodak.steptouch
---
# Step Print: gallery Bluetooth entry + connection wizard (best-effort).

- runFlow:
    when:
      visible: "Connected"
    commands:
      - assertVisible: "Connected"

- runFlow:
    when:
      notVisible: "Connected"
    commands:
      - tapOn:
          point: "92%, 10%"
          optional: true
          label: Bluetooth entry – top-right
      - waitForAnimationToEnd

- runFlow:
    when:
      visible: "Connect"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd

- runFlow: handlePrinterConnection.yaml

- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Search Again"
          commands:
            - tapOn: "Search Again"
            - waitForAnimationToEnd

      - runFlow:
          when:
            visible: "Connect"
          commands:
            - tapOn: "Connect"
            - waitForAnimationToEnd

      - runFlow:
          when:
            visible: "Bluetooth pairing request"
          commands:
            - tapOn: "Pair"
            - waitForAnimationToEnd
