appId: com.hp.impulse.sprocket
---
# Step Print: gallery Bluetooth entry + connection wizard (best-effort).

- runFlow:
    when:
      visible: "Connected"
    commands:
      - assertVisible: "Connected"

- runFlow:
    when:
      notVisible: "Connected"
    commands:
      - tapOn:
          point: "92%, 10%"
          optional: true
          label: Bluetooth entry – top-right
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow:
    when:
      visible: "Connect"
    commands:
      - tapOn: "Connect"
      - waitForAnimationToEnd:
          timeout: 2000

- runFlow: handlePrinterConnection.yaml

- repeat:
    times: 8
    commands:
      - runFlow:
          when:
            visible: "Search Again"
          commands:
            - tapOn: "Search Again"
            - waitForAnimationToEnd:
                timeout: 2000

      - runFlow:
          when:
            visible: "Connect"
          commands:
            - tapOn: "Connect"
            - waitForAnimationToEnd:
                timeout: 2000

      - runFlow:
          when:
            visible: "Bluetooth pairing request"
          commands:
            - tapOn: "Pair"
            - waitForAnimationToEnd:
                timeout: 2000
